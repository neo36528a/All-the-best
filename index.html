<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dharani CBSE Result Wish</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fecfef,#fad0c4);
    overflow:hidden;
}

.container{
    width:90%;
    max-width:500px;
    background:white;
    padding:35px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation:fadeIn 2s ease;
}

.girl{
    width:180px;
    animation:float 3s infinite ease-in-out;
}

h1{
    color:#ff4d6d;
    margin-top:15px;
    font-size:34px;
}

h2{
    color:#ff758f;
    margin-top:10px;
    font-size:24px;
}

p{
    margin-top:20px;
    color:#555;
    line-height:1.7;
    font-size:18px;
}

button{
    margin-top:25px;
    padding:14px 35px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff1e4d;
    transform:scale(1.05);
}

#wish{
    margin-top:25px;
    font-size:24px;
    color:#ff1e4d;
    display:none;
    font-weight:bold;
    animation:pop 1s ease;
}

.hearts{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    top:0;
    left:0;
    z-index:-1;
}

.hearts span{
    position:absolute;
    display:block;
    font-size:25px;
    animation:animate 10s linear infinite;
}

@keyframes animate{
    0%{
        transform:translateY(100vh);
        opacity:0;
    }
    100%{
        transform:translateY(-10vh);
        opacity:1;
    }
}

@keyframes float{
    0%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-10px);
    }
    100%{
        transform:translateY(0px);
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:scale(0.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes pop{
    0%{
        transform:scale(0);
    }
    100%{
        transform:scale(1);
    }
}

</style>
</head>

<body>

<div class="hearts">
    <span style="left:10%;">💖</span>
    <span style="left:25%; animation-delay:2s;">🌸</span>
    <span style="left:40%; animation-delay:4s;">✨</span>
    <span style="left:60%; animation-delay:1s;">💖</span>
    <span style="left:80%; animation-delay:3s;">🌸</span>
</div>

<div class="container">

    <img class="girl"
    src="https://cdn-icons-png.flaticon.com/512/6997/6997662.png"
    alt="Cute Girl">

    <h1>Dharani 💖</h1>

    <h2>CBSE Result Day ✨</h2>

    <p>
        Wishing you all the very best for your CBSE Results 🌸
        <br><br>

        No matter what the result is,
        always keep smiling because you are talented,
        strong, and amazing ✨
        <br><br>

        I truly believe in you and your bright future 💫
    </p>

    <button onclick="showWish()">
        Click Here 💖
    </button>

    <div id="wish">
        🎉 Best Of Luck Dharani ✨<br>
        You Will Shine Bright 🌸
    </div>

</div>

<script>

function showWish(){
    document.getElementById("wish").style.display = "block";
}

</script>

</body>
</html>
